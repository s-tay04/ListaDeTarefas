<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/cadastro.css">
    <title>Cadastro</title>
</head>
<body>
    
<div class="cadastro">

    <div class="title">
        <h1>Cadastro</h1>
    </div>

    <div class="formulario">
        <form id="cadastroUser">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Digite aqui...">

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Digite aqui...">

            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Digite aqui...">

            <button type="submit">Enviar</button>
        </form>
    <div id="respostaUser"></div>
    </div>

    <div class="small">
        <a href="../html/index.html">Faça login</a>
    </div>
</div>

<script src="../js/scriptUser.js"></script>
</body>
</html>
